name: Deploy React Site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Print project diagnostics
        run: |
          echo "Current folder:"
          pwd

          echo "Root files:"
          ls -la

          echo "Source files:"
          find src -maxdepth 4 -type f | sort || true

          echo "Package scripts:"
          node -e "const p=require('./package.json'); console.log(p.scripts)"

          echo "Vite config:"
          cat vite.config.ts || cat vite.config.js || true

      - name: Ensure Vite index.html exists
        run: |
          if [ -f index.html ]; then
            echo "index.html already exists."
          else
            echo "Creating index.html"
            cat > index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Machaya & Associates Legal Practitioners</title>
              <meta name="description" content="Machaya & Associates Legal Practitioners is a Harare-based law firm offering legal services in Zimbabwe." />
              <script type="module" src="/src/main.tsx"></script>
            </head>
            <body>
              <div id="root"></div>
            </body>
          </html>
          EOF
          fi

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Add SPA fallback for GitHub Pages
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy site
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
